<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU Juan Sumulong — Campus Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="chat-wrapper">

        <div class="particles" aria-hidden="true">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <div class="center-content" id="center-content">

            <div class="logo-cluster">
                <img src="images/2ndlogo.png" class="banner-logo" alt="Arellano University Logo">
            </div>

            <h1 class="welcome-text">Hello, Chief!</h1>
            <p class="sub-text">Juan Sumulong Campus · AI Assistant</p>

            <div id="chat-window"></div>

        </div>

        <div id="input-area">
            <div class="input-container">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Ask about programs, admission, campus life…"
                    onkeypress="handleKeyPress(event)"
                    autocomplete="off"
                >
                <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>

            <div id="suggestions-area">
                <button class="suggestion-btn" onclick="useSuggestion('How do I enroll?')">📋 How do I enroll?</button>
                <button class="suggestion-btn" onclick="useSuggestion('What programs are offered?')">🎓 Programs offered</button>
                <button class="suggestion-btn" onclick="useSuggestion('Show me official social media links')">📱 Social Media</button>
                <button class="suggestion-btn" onclick="useSuggestion('What are the contact numbers?')">📞 Contacts</button>
                <button class="suggestion-btn" onclick="useSuggestion('Show me the campus map')">🗺️ Campus Map</button>
            </div>
        </div>

    </div>

    <div id="link-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <div class="modal-icon">🔗</div>
            <h3 class="modal-title" id="modal-title">External Link</h3>
            <p class="modal-desc">Chief, you're about to visit:</p>
            <div id="modal-url-display" class="url-box"></div>
            <p class="modal-desc">This will open in a new tab. Proceed?</p>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="cancel-btn">← Go Back</button>
                <a id="modal-confirm-link" href="#" target="_blank" rel="noopener noreferrer" onclick="closeModal()" class="confirm-btn">Yes, Open it ↗</a>
            </div>
        </div>
    </div>

    <script src="chatbot.js"></script>
</body>
</html>
